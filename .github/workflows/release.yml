name: 🚀 Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'   # trigger saat push tag seperti v1.0.0, v1.2.3

permissions:
  contents: write  # diperlukan untuk membuat GitHub Release

jobs:
  build-and-release:
    name: Build Flutter APK & Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (required by Android build tools) ───────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter ──────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 4. Get dependencies ───────────────────────────────────
      - name: 📦 Install dependencies
        run: flutter pub get

      # ── 5. Analyze & validate code ────────────────────────────
      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos

      # ── 6. Run tests (if any) ────────────────────────────────
      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true   # jangan gagal jika belum ada unit test

      # ── 7. Build release APK ─────────────────────────────────
      - name: 🔨 Build release APK
        run: flutter build apk --release

      # ── 8. Rename APK with version tag ───────────────────────
      - name: 📝 Rename APK file
        run: |
          TAG=${GITHUB_REF_NAME}
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/QuranPlay-${TAG}.apk"
          ls -lh dist/

      # ── 9. Generate release notes from tag ───────────────────
      - name: 📋 Generate release notes
        id: release_notes
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "Generated release notes for ${GITHUB_REF_NAME}"

      # ── 10. Create GitHub Release & upload APKs ───────────────
      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Quran Play ${{ github.ref_name }}"
          body: |
            ## 🕌 Quran Play ${{ github.ref_name }}

            ### ⬇️ Download
            **[QuranPlay-${{ github.ref_name }}.apk](https://github.com/lionelyayan/quran-play/releases/download/${{ github.ref_name }}/QuranPlay-${{ github.ref_name }}.apk)**

            > Works on all Android devices (Android 5.0 / API 21+)

            ### What's New
            - See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          files: dist/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
